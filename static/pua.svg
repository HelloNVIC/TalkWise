<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <style>
      @keyframes point-finger {
        0%, 100% { transform: rotate(0deg); }
        30% { transform: rotate(-6deg); }
        60% { transform: rotate(3deg); }
      }
      @keyframes nod-head {
        0%, 100% { transform: translateY(0); }
        40% { transform: translateY(4px); }
        80% { transform: translateY(2px); }
      }
      @keyframes shake-head {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(-4deg); }
        75% { transform: rotate(4deg); }
      }
      @keyframes sweat {
        0% { opacity: 0; transform: translateY(0); }
        30% { opacity: 1; }
        100% { opacity: 0; transform: translateY(14px); }
      }
      @keyframes blink-boss {
        0%, 90%, 100% { transform: scaleY(1); }
        95% { transform: scaleY(0.1); }
      }
      @keyframes blink-emp {
        0%, 85%, 100% { transform: scaleY(1); }
        90% { transform: scaleY(0.1); }
      }
      @keyframes steam {
        0% { opacity: 0; transform: translateY(0) scale(0.8); }
        30% { opacity: 0.6; }
        100% { opacity: 0; transform: translateY(-12px) scale(1.2); }
      }
      @keyframes float-up {
        0%, 100% { transform: translateY(0); opacity: 1; }
        50% { transform: translateY(-3px); opacity: 0.8; }
      }
      @keyframes shiver {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-1px); }
        75% { transform: translateX(1px); }
      }
      @keyframes arrow-pulse {
        0%, 100% { opacity: 0.3; transform: translateX(0); }
        50% { opacity: 0.8; transform: translateX(4px); }
      }
      .point-finger { animation: point-finger 1.5s ease-in-out infinite; transform-origin: 130px 95px; }
      .nod-head { animation: nod-head 1.8s ease-in-out infinite; transform-origin: center; }
      .shake-head { animation: shake-head 0.8s ease-in-out infinite; transform-origin: 260px 70px; }
      .sweat1 { animation: sweat 1.5s ease-in infinite; }
      .sweat2 { animation: sweat 1.5s ease-in 0.5s infinite; }
      .sweat3 { animation: sweat 2s ease-in 1s infinite; }
      .blink-boss { animation: blink-boss 5s ease-in-out infinite; transform-origin: center; }
      .blink-emp { animation: blink-emp 3s ease-in-out infinite; transform-origin: center; }
      .steam1 { animation: steam 2s ease-out infinite; }
      .steam2 { animation: steam 2s ease-out 0.7s infinite; }
      .float-up { animation: float-up 2.5s ease-in-out infinite; }
      .shiver { animation: shiver 0.3s ease-in-out infinite; }
      .arrow-pulse { animation: arrow-pulse 1.5s ease-in-out infinite; }
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="200" fill="#f8fafc" rx="8"/>
  <!-- 办公室墙面 -->
  <rect x="0" y="0" width="400" height="140" fill="#f1f5f9" rx="8"/>
  <!-- 窗户 -->
  <rect x="310" y="15" width="60" height="55" rx="4" fill="#bfdbfe"/>
  <line x1="340" y1="15" x2="340" y2="70" stroke="#93c5fd" stroke-width="1.5"/>
  <line x1="310" y1="42" x2="370" y2="42" stroke="#93c5fd" stroke-width="1.5"/>
  <!-- 窗外城市剪影 -->
  <rect x="314" y="35" width="6" height="35" fill="#93c5fd" opacity="0.4"/>
  <rect x="322" y="25" width="8" height="45" fill="#93c5fd" opacity="0.3"/>
  <rect x="332" y="38" width="5" height="32" fill="#93c5fd" opacity="0.4"/>
  <rect x="348" y="28" width="7" height="42" fill="#93c5fd" opacity="0.3"/>
  <rect x="358" y="40" width="6" height="30" fill="#93c5fd" opacity="0.4"/>

  <!-- 地板 -->
  <rect x="0" y="140" width="400" height="60" fill="#e2e8f0" rx="0"/>

  <!-- ========== 老板（左侧） ========== -->
  <g>
    <!-- 身体 - 西装 -->
    <rect x="55" y="88" width="50" height="52" rx="6" fill="#1e293b"/>
    <!-- 西装领带 -->
    <path d="M76 88 L80 100 L78 102 L76 100 L74 102 L72 100 Z" fill="#dc2626"/>
    <!-- 西装翻领 -->
    <path d="M68 88 L76 96 L70 88" fill="#334155"/>
    <path d="M84 88 L76 96 L82 88" fill="#334155"/>

    <!-- 头 -->
    <circle cx="80" cy="68" r="20" fill="#fcd34d"/>
    <!-- 头发 - 大背头 -->
    <path d="M62 62 Q62 46 80 44 Q98 46 98 62 Q98 56 90 54 Q80 50 70 54 Q62 56 62 62" fill="#1e293b"/>

    <!-- 眼睛 -->
    <g class="blink-boss">
      <ellipse cx="73" cy="68" rx="3" ry="3" fill="#1e293b"/>
      <ellipse cx="87" cy="68" rx="3" ry="3" fill="#1e293b"/>
    </g>
    <!-- 眉毛 - 皱眉 -->
    <path d="M67 61 Q70 58 76 60" fill="none" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <path d="M84 60 Q90 58 93 61" fill="none" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>

    <!-- 嘴 - 说话 -->
    <g class="nod-head">
      <ellipse cx="80" cy="78" rx="5" ry="4" fill="#92400e"/>
    </g>

    <!-- 左手 - 叉腰 -->
    <path d="M55 95 Q38 105 40 125 Q42 130 46 128 Q44 115 55 108" fill="#1e293b"/>
    <circle cx="42" cy="126" r="4" fill="#fcd34d"/>

    <!-- 右手 - 指指点点 -->
    <g class="point-finger">
      <path d="M105 95 Q125 90 140 88" fill="none" stroke="#1e293b" stroke-width="7" stroke-linecap="round"/>
      <!-- 手掌 -->
      <circle cx="140" cy="88" r="5" fill="#fcd34d"/>
      <!-- 手指 -->
      <rect x="143" y="85" width="14" height="4" rx="2" fill="#fcd34d"/>
    </g>

    <!-- 说话气场线 -->
    <path class="arrow-pulse" d="M158 84 L166 82" stroke="#dc2626" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <path class="arrow-pulse" d="M155 90 L165 90" stroke="#dc2626" stroke-width="2" stroke-linecap="round" opacity="0.4" style="animation-delay:0.3s"/>
    <path class="arrow-pulse" d="M158 96 L166 98" stroke="#dc2626" stroke-width="2" stroke-linecap="round" opacity="0.3" style="animation-delay:0.6s"/>
  </g>

  <!-- ========== PUA 气泡 ========== -->
  <g class="float-up">
    <rect x="150" y="12" width="140" height="46" rx="14" fill="white" stroke="#fecaca" stroke-width="1.5"/>
    <path d="M168 58 L162 70 L180 58" fill="white"/>
    <path d="M168 58 L180 58" fill="white" stroke="white" stroke-width="2"/>
    <text x="220" y="31" text-anchor="middle" font-size="10" fill="#64748b" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">我这是为你好</text>
    <text x="220" y="47" text-anchor="middle" font-size="10" fill="#dc2626" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-weight="700">别人想这机会还没有呢</text>
  </g>

  <!-- ========== 员工（右侧） ========== -->
  <g class="shiver">
    <!-- 身体 - 便装 -->
    <rect x="248" y="95" width="38" height="45" rx="6" fill="#3b82f6"/>
    <!-- T恤领口 -->
    <path d="M260 95 Q267 100 274 95" fill="#2563eb"/>

    <!-- 头 -->
    <circle cx="267" cy="75" r="18" fill="#fcd34d"/>
    <!-- 头发 - 凌乱 -->
    <path d="M252 70 Q250 55 265 53 Q280 51 284 68 Q284 60 278 58 Q270 54 260 58 Q252 62 252 70" fill="#78350f"/>
    <!-- 几根竖起的头发 -->
    <line x1="260" y1="55" x2="258" y2="49" stroke="#78350f" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="268" y1="53" x2="268" y2="47" stroke="#78350f" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="275" y1="55" x2="277" y2="49" stroke="#78350f" stroke-width="1.5" stroke-linecap="round"/>

    <!-- 眼睛 - 小而紧张 -->
    <g class="blink-emp">
      <circle cx="261" cy="74" r="2" fill="#1e293b"/>
      <circle cx="273" cy="74" r="2" fill="#1e293b"/>
    </g>
    <!-- 眉毛 - 上扬紧张 -->
    <path d="M256 67 Q259 64 264 66" fill="none" stroke="#78350f" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M270 66 Q275 64 278 67" fill="none" stroke="#78350f" stroke-width="1.5" stroke-linecap="round"/>

    <!-- 嘴 - 尴尬微笑 -->
    <g class="shake-head">
      <path d="M262 83 Q267 86 272 83" fill="none" stroke="#92400e" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- 汗滴 -->
    <g class="sweat1">
      <path d="M286 64 Q288 58 290 64 Q290 68 286 68 Q282 68 286 64" fill="#60a5fa" opacity="0.7"/>
    </g>
    <g class="sweat2">
      <path d="M292 72 Q293 68 294 72 Q294 75 292 75 Q290 75 292 72" fill="#60a5fa" opacity="0.6"/>
    </g>
    <g class="sweat3">
      <path d="M254 62 Q255 58 256 62 Q256 65 254 65 Q252 65 254 62" fill="#60a5fa" opacity="0.5"/>
    </g>

    <!-- 左手 - 背后 -->
    <path d="M248 102 Q238 115 245 125" fill="none" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/>
    <!-- 右手 - 背后 -->
    <path d="M286 102 Q296 115 290 125" fill="none" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/>
    <!-- 双手在背后握在一起 -->
    <circle cx="267" cy="130" r="3" fill="#fcd34d"/>
  </g>

  <!-- 咖啡杯（桌上） -->
  <rect x="195" y="128" width="18" height="16" rx="3" fill="#94a3b8"/>
  <path d="M213 132 Q220 132 220 138 Q220 144 213 144" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <path class="steam1" d="M200 126 Q202 120 200 114" fill="none" stroke="#cbd5e1" stroke-width="1.2" stroke-linecap="round"/>
  <path class="steam2" d="M206 126 Q208 118 206 112" fill="none" stroke="#cbd5e1" stroke-width="1.2" stroke-linecap="round"/>

  <!-- 桌子 -->
  <rect x="180" y="144" width="100" height="6" rx="3" fill="#94a3b8" opacity="0.6"/>

  <!-- 小蘑菇装饰 - 左下 -->
  <g transform="translate(10, 162)" opacity="0.35">
    <path d="M0 15 Q0 0 12 0 Q24 0 24 15 Z" fill="#dc2626"/>
    <circle cx="6" cy="8" r="2" fill="white" opacity="0.5"/>
    <circle cx="16" cy="5" r="1.5" fill="white" opacity="0.5"/>
    <rect x="10" y="15" width="4" height="10" rx="2" fill="#f1f5f9"/>
  </g>

  <!-- 小蘑菇装饰 - 右下 -->
  <g transform="translate(362, 158) scale(0.8)" opacity="0.25">
    <path d="M0 15 Q0 0 12 0 Q24 0 24 15 Z" fill="#dc2626"/>
    <circle cx="8" cy="6" r="2" fill="white" opacity="0.5"/>
    <rect x="10" y="15" width="4" height="10" rx="2" fill="#f1f5f9"/>
  </g>

  <!-- 地板阴影 -->
  <ellipse cx="80" cy="148" rx="30" ry="4" fill="#94a3b8" opacity="0.15"/>
  <ellipse cx="267" cy="148" rx="22" ry="3" fill="#94a3b8" opacity="0.15"/>
</svg>