<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <style>
      @keyframes type-hand {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(-8deg); }
        50% { transform: rotate(0deg); }
        75% { transform: rotate(-5deg); }
      }
      @keyframes float-up {
        0%, 100% { transform: translateY(0); opacity: 1; }
        50% { transform: translateY(-4px); opacity: 0.7; }
      }
      @keyframes float-down {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(3px); }
      }
      @keyframes sweat {
        0% { opacity: 0; transform: translateY(0); }
        30% { opacity: 1; }
        100% { opacity: 0; transform: translateY(12px); }
      }
      @keyframes blink {
        0%, 90%, 100% { transform: scaleY(1); }
        95% { transform: scaleY(0.1); }
      }
      @keyframes steam {
        0% { opacity: 0; transform: translateY(0) scale(0.8); }
        30% { opacity: 0.6; }
        100% { opacity: 0; transform: translateY(-14px) scale(1.2); }
      }
      @keyframes screen-glow {
        0%, 100% { opacity: 0.03; }
        50% { opacity: 0.08; }
      }
      .typing { animation: type-hand 0.4s ease-in-out infinite; transform-origin: 155px 128px; }
      .float-up { animation: float-up 2s ease-in-out infinite; }
      .float-down { animation: float-down 2.5s ease-in-out infinite; }
      .sweat-drop { animation: sweat 1.5s ease-in infinite; }
      .eye-blink { animation: blink 4s ease-in-out infinite; transform-origin: center; }
      .steam1 { animation: steam 2s ease-out infinite; }
      .steam2 { animation: steam 2s ease-out 0.6s infinite; }
      .steam3 { animation: steam 2s ease-out 1.2s infinite; }
      .screen-glow { animation: screen-glow 3s ease-in-out infinite; }
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="200" fill="#f8fafc" rx="8"/>

  <!-- 桌子 -->
  <rect x="60" y="145" width="280" height="8" rx="4" fill="#94a3b8" opacity="0.5"/>
  <rect x="80" y="153" width="8" height="40" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="312" y="153" width="8" height="40" rx="2" fill="#94a3b8" opacity="0.3"/>

  <!-- 咖啡杯 -->
  <g class="float-down">
    <rect x="290" y="124" width="22" height="20" rx="4" fill="#94a3b8"/>
    <path d="M312 130 Q322 130 322 137 Q322 144 312 144" fill="none" stroke="#94a3b8" stroke-width="2"/>
    <!-- steam -->
    <path class="steam1" d="M297 122 Q299 116 297 110" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
    <path class="steam2" d="M303 122 Q305 114 303 108" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
    <path class="steam3" d="M309 122 Q311 116 309 110" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- 显示器 -->
  <rect x="120" y="60" width="120" height="80" rx="6" fill="#1e293b"/>
  <rect x="126" y="66" width="108" height="62" rx="3" fill="#3b82f6" opacity="0.15"/>
  <rect class="screen-glow" x="126" y="66" width="108" height="62" rx="3" fill="#3b82f6"/>
  <!-- 屏幕内容 - 代码行 -->
  <rect x="132" y="74" width="40" height="3" rx="1.5" fill="#60a5fa" opacity="0.6"/>
  <rect x="132" y="81" width="60" height="3" rx="1.5" fill="#93c5fd" opacity="0.4"/>
  <rect x="136" y="88" width="50" height="3" rx="1.5" fill="#60a5fa" opacity="0.5"/>
  <rect x="136" y="95" width="35" height="3" rx="1.5" fill="#93c5fd" opacity="0.4"/>
  <rect x="132" y="102" width="55" height="3" rx="1.5" fill="#60a5fa" opacity="0.6"/>
  <rect x="136" y="109" width="45" height="3" rx="1.5" fill="#93c5fd" opacity="0.3"/>
  <!-- 光标 -->
  <rect x="189" y="102" width="2" height="5" fill="#fff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" repeatCount="indefinite"/>
  </rect>
  <!-- 显示器支架 -->
  <rect x="170" y="140" width="20" height="5" rx="2" fill="#64748b"/>
  <rect x="160" y="143" width="40" height="3" rx="1.5" fill="#64748b"/>

  <!-- 键盘 -->
  <rect x="135" y="133" width="70" height="10" rx="3" fill="#cbd5e1"/>

  <!-- 人物 -->
  <g>
    <!-- 身体 -->
    <rect x="52" y="100" width="40" height="45" rx="8" fill="#3b82f6"/>
    <!-- 领子 -->
    <path d="M65 100 L72 108 L79 100" fill="#1d4ed8"/>

    <!-- 头 -->
    <circle cx="72" cy="82" r="20" fill="#fcd34d"/>
    <!-- 头发 -->
    <path d="M55 78 Q55 60 72 60 Q89 60 89 78 Q89 72 82 70 Q72 68 62 70 Q55 72 55 78" fill="#1e293b"/>

    <!-- 眼睛 - 带眨眼 -->
    <g class="eye-blink">
      <circle cx="65" cy="82" r="2.5" fill="#1e293b"/>
      <circle cx="79" cy="82" r="2.5" fill="#1e293b"/>
    </g>
    <!-- 眼镜 -->
    <circle cx="65" cy="82" r="7" fill="none" stroke="#64748b" stroke-width="1.5"/>
    <circle cx="79" cy="82" r="7" fill="none" stroke="#64748b" stroke-width="1.5"/>
    <line x1="72" y1="82" x2="72" y2="82" stroke="#64748b" stroke-width="1.5"/>
    <path d="M58 80 Q54 78 52 80" fill="none" stroke="#64748b" stroke-width="1.5"/>
    <path d="M86 80 Q90 78 92 80" fill="none" stroke="#64748b" stroke-width="1.5"/>

    <!-- 嘴 - 微笑 -->
    <path d="M66 90 Q72 95 78 90" fill="none" stroke="#92400e" stroke-width="1.5" stroke-linecap="round"/>

    <!-- 汗滴 -->
    <g class="sweat-drop">
      <path d="M94 72 Q96 68 98 72 Q98 76 94 76 Q90 76 94 72" fill="#60a5fa" opacity="0.7"/>
    </g>

    <!-- 右手打字 -->
    <g class="typing">
      <path d="M92 115 Q120 120 145 130" fill="none" stroke="#fcd34d" stroke-width="6" stroke-linecap="round"/>
      <circle cx="145" cy="130" r="4" fill="#fcd34d"/>
    </g>
    <!-- 左手 -->
    <path d="M52 115 Q40 130 50 140" fill="none" stroke="#fcd34d" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- 对话气泡 - 右上角 -->
  <g class="float-up">
    <rect x="250" y="20" width="130" height="44" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <path d="M260 64 L255 74 L270 64" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <path d="M260 64 L270 64" fill="white" stroke-width="0"/>
    <text x="315" y="38" text-anchor="middle" font-size="10" fill="#64748b" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">这个需求很简单</text>
    <text x="315" y="54" text-anchor="middle" font-size="10" fill="#3b82f6" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-weight="600">怎么还没上线？</text>
  </g>

  <!-- 小蘑菇装饰 - 左下 -->
  <g transform="translate(20, 160)" opacity="0.4">
    <path d="M0 15 Q0 0 12 0 Q24 0 24 15 Z" fill="#3b82f6"/>
    <circle cx="6" cy="8" r="2" fill="white" opacity="0.6"/>
    <circle cx="16" cy="5" r="1.5" fill="white" opacity="0.6"/>
    <rect x="10" y="15" width="4" height="10" rx="2" fill="#f1f5f9"/>
  </g>

  <!-- 小蘑菇装饰 - 右下 -->
  <g transform="translate(355, 155) scale(0.8)" opacity="0.3">
    <path d="M0 15 Q0 0 12 0 Q24 0 24 15 Z" fill="#3b82f6"/>
    <circle cx="8" cy="6" r="2" fill="white" opacity="0.6"/>
    <rect x="10" y="15" width="4" height="10" rx="2" fill="#f1f5f9"/>
  </g>
</svg>